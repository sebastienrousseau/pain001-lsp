name: Bug Report
description: Report a reproducible problem in pain001-lsp
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: pain001-lsp Version
      placeholder: "0.0.52"
    validations:
      required: true
  - type: input
    id: pain001_version
    attributes:
      label: pain001 Version
      placeholder: "0.0.52"
    validations:
      required: true
  - type: dropdown
    id: python_version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: editor
    attributes:
      label: Editor / LSP Client
      options:
        - Neovim (nvim-lspconfig)
        - Neovim (built-in vim.lsp.config)
        - VS Code (generic LSP)
        - Helix
        - Emacs (lsp-mode / eglot)
        - Other
    validations:
      required: true
  - type: dropdown
    id: file_type
    attributes:
      label: File Type
      options:
        - JSON (record array)
        - CSV
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal File Snippet
      description: |
        A snippet (5-20 lines) of the JSON or CSV that triggers the
        problem. Redact any sensitive IBAN/BIC values - placeholders
        are fine.
      render: text
    validations:
      required: true
  - type: textarea
    id: server_log
    attributes:
      label: Server stderr / LSP trace
      description: |
        Anything the language server emitted, plus the LSP message
        trace if your editor surfaces one.
  - type: textarea
    id: extra
    attributes:
      label: Anything Else
