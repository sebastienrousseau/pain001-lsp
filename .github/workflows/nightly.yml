name: Nightly Quality

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Nightly check + coverage upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pain001 + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/pain001.git@feat/v0.0.52"
          pip install -e .
          pip install pytest pytest-cov interrogate ruff black mypy bandit pip-audit types-jsonschema

      - name: Full gate (lint + type + tests + interrogate + bandit + audit)
        run: |
          ruff check pain001_lsp/ tests/
          black --check pain001_lsp/ tests/
          mypy pain001_lsp/
          pytest tests/ --cov=pain001_lsp --cov-branch --cov-report=xml --cov-fail-under=100
          interrogate -c pyproject.toml pain001_lsp
          bandit -r pain001_lsp/ -ll
          pip-audit
